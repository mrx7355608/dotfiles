backend = "glx"

opacity-rule = [
	"90:class_g  = 'Rofi'",
	"91:class_g = 'Xfce4-terminal'",
	"91:class_g = 'qutebrowser'",
	"91:class_g = 'Insomnia'"
];

blur-background = true
blur-method = "dual_kawase"
blur-strength = 2

rounded-corners = true
corner-radius = 5 
rounded-corners-exclude = [
    "window_type = 'dock'"
]

fading = true
fade-in-step = 0.05
fade-out-step = 0.05
